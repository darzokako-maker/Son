name: SonOyuncu-Blink-Build

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # Derleyiciyi (cl.exe) aktif eder
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # WinDivert dosyalarını indirir ve hazırlar
    - name: Download WinDivert
      run: |
        curl -L https://github.com/basil00/WinDivert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip -o windivert.zip
        expand-archive windivert.zip -destinationpath wd

    # Derleme İşlemi
    - name: Compile
      run: |
        cl.exe /EHsc /I wd/WinDivert-2.2.2-A/include main.cpp /link /LIBPATH:wd/WinDivert-2.2.2-A/x64 WinDivert.lib /OUT:SonOyuncuBlink.exe

    # Oluşan EXE ve Driver dosyalarını paketler
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SonOyuncu-Blink-EXE
        path: |
          SonOyuncuBlink.exe
          wd/WinDivert-2.2.2-A/x64/WinDivert64.sys
          wd/WinDivert-2.2.2-A/x64/WinDivert.dll
          
